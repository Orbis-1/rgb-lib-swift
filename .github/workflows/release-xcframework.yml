name: Publish XCFramework Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create, for example v0.3.0-beta.6
        required: true
        type: string
      release_branch:
        description: Branch to update before tagging
        required: true
        default: main
        type: string
      release_name:
        description: Optional release name
        required: false
        default: ""
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish-xcframework:
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      RELEASE_BRANCH: ${{ inputs.release_branch }}
      RELEASE_NAME: ${{ inputs.release_name }}

    steps:
      - name: Checkout repository branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_branch }}

      - name: Configure Git for private submodule access
        run: |
          # If the default GITHUB_TOKEN cannot read the submodule, replace
          # github.token below with a PAT-backed repository secret.
          SUBMODULE_TOKEN='${{ secrets.GH_PAT }}'
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Generate bindings and xcframework zip
        run: bash ./generate.sh

      - name: Commit generated Swift bindings
        run: |
          if git diff --quiet -- Sources/RgbLib/RgbLib.swift rgb-lib; then
            echo "No generated source changes to commit"
            exit 0
          fi

          git add Sources/RgbLib/RgbLib.swift rgb-lib
          git commit -m "Update generated Swift bindings for ${RELEASE_TAG}"
          git push origin "HEAD:${RELEASE_BRANCH}"

      - name: Create and push release tag
        run: |
          git fetch --tags origin
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists"
            exit 1
          fi

          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release and upload xcframework zip
        uses: softprops/action-gh-release@v2
        with:
          files: rgb_libFFI.xcframework.zip
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.release_tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
